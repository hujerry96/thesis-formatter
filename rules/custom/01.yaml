template:
  name: '01'
  description: 國內大學碩博士論文格式 (標楷體+新細明體) (從 zh 複製)
page_margins:
  body:
    top: 3.0
    bottom: 2.5
    left: 3.0
    right: 3.0
  cover:
    top: 2.54
    bottom: 2.54
    left: 3.18
    right: 3.18
binding:
  extra_left: 2.0
paper:
  size: A4
  width_cm: 21.0
  height_cm: 29.7
  orientation: portrait
fonts:
  chinese:
    name: 新細明體
    size: 12
  chinese_title:
    name: 標楷體
    size: 12
  english:
    name: Bell MT
    size: 12
  heading_number:
    name: 標楷體
line_spacing:
  type: multiple
  value: 1.5
paragraph_spacing:
  before: 0
  after: 0
first_line_indent:
  enabled: true
  value_cm: 0.75
  value_chars: 2
heading_styles:
  title:
    font_size: 20
    bold: true
    align: left
    font_name: 華康龍門石碑
    chinese_font: 華康龍門石碑
    english_font: Bodoni MT
    before: 0
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering: {}
  heading1:
    font_size: 20
    bold: true
    align: left
    font_name: 華康超明體
    chinese_font: 華康超明體
    english_font: Bahnschrift
    before: 18
    after: 0
    keep_with_next: true
    page_break_before: true
    line_spacing: 1.5
    numbering:
      format: '{chapter}.'
      example: 1.  緒論
      font_name: 標楷體
  heading2:
    font_size: 16
    bold: true
    align: left
    font_name: 標楷體
    chinese_font: 標楷體
    english_font: Times New Roman
    before: 12
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering:
      format: '{chapter}.{section}'
      example: 1.1  研究背景
      font_name: 標楷體
  heading3:
    font_size: 12
    bold: true
    align: left
    font_name: 標楷體
    chinese_font: 標楷體
    english_font: Times New Roman
    before: 6
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering:
      format: '{chapter}.{section}.{sub}'
      example: 1.1.1  問題陳述
      font_name: 標楷體
  heading4:
    font_size: 12
    bold: true
    align: center
    font_name: 細明體
    chinese_font: 細明體
    english_font: '@Arial Unicode MS'
    before: 6
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering:
      format: '{chapter}.{section}.{sub}.{item}'
      font_name: 標楷體
body_style:
  font_name: 標楷體
  english_font: Times New Roman
  font_size: 12
  align: justify
  first_line_indent_chars: 2
  line_spacing: 1.5
numbered_list:
  no_indent: true
  pattern: ^[\d]+[.、）)]
  skip_in_references: false
page_number:
  front_matter:
    style: roman_lower
    position: bottom
    align: center
    font_size: 12
  body:
    style: arabic
    position: bottom
    align: center
    start_from: 1
    font_size: 12
figures:
  numbering: dot
  example: 圖 3.1
  caption_below: true
  caption_bold: false
  caption_align: justify
  caption_font_size: 12
  source_font_size: 10
tables:
  numbering: dot
  example: 表 3.1
  caption_above: true
  caption_bold: true
  caption_align: justify
  caption_font_size: 12
  source_font_size: 10
heading_numbering_conversion:
  from_dash: true
  to_dot: true
  examples:
  - from: 1-1
    to: '1.1'
  - from: 1-1-1
    to: 1.1.1
  - from: 3-2
    to: '3.2'
  - from: 3-2-1
    to: 3.2.1
structure_order:
- 封面
- 空白頁
- 書名頁
- 授權書
- 指導教授推薦書
- 考試委員會審定書
- 中文摘要
- 英文摘要
- 誌謝
- 目錄
- 圖目
- 表目
- 論文正文
- 參考文獻
- 附錄
- 自傳
quotes:
  chinese: 「」
  english: '""'
  long_quote_indent: 3
  long_quote_font_size: 10
references:
  citation_style: 上標-[]
  format: 序號. 作者. 篇名. 出處, 年份.
  font_size: 12
  line_spacing: 1.5
