# 中文論文模板
# 適用: 國內大學碩博士中文論文

template:
  name: "中文論文"
  description: "國內大學碩博士論文格式 (標楷體)"

## 頁面設定
page_margins:
  body:
    top: 3.0
    bottom: 2.5
    left: 2.5
    right: 2.0
  cover:
    top: 2.54
    bottom: 2.54
    left: 3.18
    right: 3.18

binding:
  extra_left: 2.0

## 紙張
paper:
  size: "A4"
  width_cm: 21.0
  height_cm: 29.7
  orientation: "portrait"
  toc_font_size: 12

## 字體
fonts:
  chinese:
    name: "標楷體"
    size: 12
  chinese_title:
    name: "標楷體"
    size: 12
  english:
    name: "Times New Roman"
    size: 12
  heading_number:
    name: "標楷體"

## 行距
line_spacing:
  type: "multiple"
  value: 1.5

## 段距
paragraph_spacing:
  before: 0
  after: 0

## 首行縮排
first_line_indent:
  enabled: true
  value_cm: 0.75
  value_chars: 2

## 標題樣式 (Word樣式)
heading_styles:
  heading1:
    font_size: 20
    bold: true
    align: "center"
    font_name: "標楷體"
    chinese_font: "標楷體"
    english_font: "Times New Roman"
    before: 18
    after: 0
    keep_with_next: true
    page_break_before: true
    line_spacing: 1.5
    numbering:
      format: "{chapter}."
      example: "1.  緒論"
      font_name: "標楷體"
  heading2:
    font_size: 16
    bold: true
    align: "left"
    font_name: "標楷體"
    chinese_font: "標楷體"
    english_font: "Times New Roman"
    before: 12
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering:
      format: "{chapter}.{section}"
      example: "1.1  研究背景"
      font_name: "標楷體"
  heading3:
    font_size: 14
    bold: true
    align: "left"
    font_name: "標楷體"
    chinese_font: "標楷體"
    english_font: "Times New Roman"
    before: 6
    after: 0
    keep_with_next: true
    page_break_before: false
    line_spacing: 1.5
    numbering:
      format: "{chapter}.{section}.{sub}"
      example: "1.1.1  問題陳述"
      font_name: "標楷體"
  heading4:
    font_size: 12
    bold: true
    align: "left"
    font_name: "標楷體"
    before: 6
    after: 0
    line_spacing: 1.5
    numbering:
      format: "{chapter}.{section}.{sub}.{item}"
      font_name: "標楷體"

## 內文樣式
body_style:
  font_name: "標楷體"
  english_font: "Times New Roman"
  font_size: 12
  align: "justify"
  first_line_indent_chars: 2
  line_spacing: 1.5

## 數字清單凸排
numbered_list:
  hanging_indent: true
  left_indent: 0
  hanging_indent_twips: 360
  first_line_indent_chars: 0
  pattern: "^[\\d]+[.、）)]"
  skip_in_references: false

## 頁碼
page_number:
  front_matter:
    style: "roman_lower"
    position: "bottom"
    align: "center"
    font_size: 12
  body:
    style: "arabic"
    position: "bottom"
    align: "center"
    start_from: 1
    font_size: 12

## 圖表格式
figures:
  numbering: "dot"
  example: "圖 3.1"
  caption_below: true
  caption_bold: false
  caption_align: "justify"
  caption_font_size: 12
  source_font_size: 10

tables:
  numbering: "dot"
  example: "表 3.1"
  caption_above: true
  caption_bold: true
  caption_align: "justify"
  caption_font_size: 12
  source_font_size: 10

## 標題編號格式轉換
heading_numbering_conversion:
  from_dash: true
  to_dot: true
  examples:
    - from: "1-1"
      to: "1.1"
    - from: "1-1-1"
      to: "1.1.1"
    - from: "3-2"
      to: "3.2"
    - from: "3-2-1"
      to: "3.2.1"

## 章節結構
structure_order:
  - 封面
  - 空白頁
  - 書名頁
  - 授權書
  - 指導教授推薦書
  - 考試委員會審定書
  - 中文摘要
  - 英文摘要
  - 誌謝
  - 目錄
  - 圖目
  - 表目
  - 論文正文
  - 參考文獻
  - 附錄
  - 自傳

## 封面頁設定
cover:
  detect_keywords:
    - "雷射"
    - "Study on"
    - "MAR"

## 引文格式
quotes:
  chinese: "「」"
  english: '""'
  long_quote_indent: 3
  long_quote_font_size: 10

## 參考文獻
references:
  citation_style: "上標-[]"
  format: "序號. 作者. 篇名. 出處, 年份."
  font_size: 12
  line_spacing: 1.5
